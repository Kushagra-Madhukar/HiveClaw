name: architecture-soak

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run soak suite
        run: scripts/run-soak-suite.sh
